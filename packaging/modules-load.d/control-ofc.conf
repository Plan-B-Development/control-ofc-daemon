# Kernel modules for motherboard hardware monitoring (control-ofc-daemon).
#
# CPU temperature modules (coretemp, k10temp) and SMBus adapter modules
# (i2c-i801, i2c-piix4) auto-load via PCI/ACPI device matching on most
# distributions. The modules below are Super I/O chipset drivers that
# expose motherboard fan headers and temperatures — they sit on ISA I/O
# ports without a bus-enumerable trigger, so the kernel cannot auto-load
# them.
#
# Loading a module for a chip that is not present is harmless (modprobe
# exits silently). To disable this file, rename or delete it.
#
# For hardware not covered here, install lm_sensors and run:
#   sudo sensors-detect

# Nuvoton Super I/O (ASUS, Gigabyte, MSI — very common on modern boards)
nct6775

# ITE Super I/O (Gigabyte, ASRock, some ASUS)
it87

# Winbond/Nuvoton legacy Super I/O (older boards)
w83627ehf

# SATA/SAS drive temperature (not auto-loaded before kernel 6.1)
drivetemp
